name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit + integration tests (no E2E — no model in CI)
        run: pytest tests/test_smoke.py tests/test_v11.py tests/test_v12.py tests/test_v13.py tests/test_v14.py tests/test_v14_fixes.py -v --tb=short

      - name: Check CLI entry point
        run: context --help

      - name: Lint with ruff
        run: ruff check contextos/ --select E,F,I --ignore E501
        continue-on-error: true

  package-check:
    name: Verify package builds cleanly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
